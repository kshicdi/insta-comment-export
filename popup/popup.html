<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{ --accent:#1B3A6B; --page:#FBFAF7; --text:#191919; --muted:#6F6A60; --hairline:#E3DDD0; }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Pretendard Variable',Pretendard,system-ui,sans-serif;width:300px;padding:18px;background:var(--page);color:var(--text)}
  .head{display:flex;align-items:center;gap:9px;margin-bottom:12px}
  .mark{width:28px;height:28px;border-radius:7px;background:var(--accent);display:grid;place-items:center;flex:0 0 auto}
  .mark svg{width:17px;height:17px;stroke:#fff}
  h1{font-size:14px;font-weight:700;letter-spacing:-.01em}
  .sub{font-size:11px;color:var(--muted);font-weight:500}
  p{font-size:12.5px;color:var(--muted);line-height:1.55;margin:10px 0 14px}
  ol{font-size:12.5px;color:var(--text);line-height:1.7;padding-left:18px;margin-bottom:14px}
  .btn{display:block;width:100%;text-align:center;padding:11px;border-radius:9px;background:var(--accent);color:#fff;
    font-size:13px;font-weight:700;border:0;cursor:pointer;text-decoration:none;font-family:inherit}
  .btn:hover{filter:brightness(1.06)}
  .foot{font-size:10.5px;color:var(--muted);text-align:center;margin-top:12px}
</style>
</head>
<body>
  <div class="head">
    <span class="mark"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.2"><circle cx="12" cy="12" r="7"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg></span>
    <div><h1>인스타 댓글 스카우트</h1><div class="sub">한끗랩 · 원스카우트</div></div>
  </div>
  <p>인스타그램 게시물의 댓글을 한 번에 모아 엑셀로 내려받는 도구예요.</p>
  <ol>
    <li>인스타그램 <b>게시물</b>이나 <b>릴스</b>를 엽니다.</li>
    <li>화면 <b>우측 하단</b>의 한끗랩 버튼을 누릅니다.</li>
    <li>옵션을 고르고 <b>추출 시작</b>을 누릅니다.</li>
  </ol>
  <a class="btn" id="openInsta" href="https://www.instagram.com/" target="_blank">인스타그램 열기</a>
  <div class="foot">버튼이 안 보이면 게시물을 연 뒤 새로고침하세요.</div>
  <script src="popup.js"></script>
</body>
</html>
